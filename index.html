<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="./style/style.css">
    <title>Conversor de moeda</title>
</head>

<body>
    <main>
        <section>
            <div>
                <h1>CONVERSOR UNIVERSAL</h1>
                <button>Dark mode</button>
            </div>
            <div>
                <h2>Valor</h2>
                <input type="number" id="">
            </div>
            <div>
                <div>
                    <img src="./assets/countries/brl.png" alt="Icon-brl">
                    <h3>BRL</h3>
                    <p>Real Brasileiro</p>
                </div>
                <div>
                    <p>Conversor de</p>
                    <span class="material-symbols-outlined">
                        keyboard_arrow_down
                    </span>
                </div>
            </div>
            <div>
                <div>
                    <img src="./assets/countries/usd.png" alt="Icon-usd">
                    <h3>USD</h3>
                    <p>Dolar dos Estados Unidos</p>
                </div>
                <div>
                    <p>Para</p>
                    <span class="material-symbols-outlined">
                        keyboard_arrow_down
                    </span>
                </div>
            </div>
            <div>
                <p>Conversão de: <span>Dólar dos Estados Unidos/USD (220)</span></p>
                <h3><span>R$</span>5.000</h3>
            </div>
            <div>
                <p>Para: <span>Dólar dos Estados Unidos/USD (220)</span></p>
                <h3><span>$</span>1.000</h3>
            </div>
            <div>
                <p>1 Real brasileiro igual a 0,20 Dólar americano</p>
            </div>
            <button>Converter</button>
        </section>
    </main>
    <script src="./src/script.js"></script>
</body>

</html>
