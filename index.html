<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="./style/style.css">
    <title>Conversor de moeda</title>
</head>

<body>
    <section class="conteiner-principal">
        <div class="box-title">
            <h1>CONVERSOR UNIVERSAL</h1>
            <button id="btn-dark-mode" class="material-symbols-outlined">ev_shadow</button>
        </div>

        <div id="box-inicio">
            <div class="box-valor">
                <h2>Valor</h2>
                <input placeholder="Digite o valor a converter" type="number" maxlength="5" inputmode="numeric"
                    id="input-valor">
            </div>
            <div onclick="convertionSelect('de')" class="box-para-converter">
                <div class="box-sigle">
                    <div>
                        <img id="img-m" src="./assets/countries/brl.png" alt="Icon-brl">
                        <h3 id="sigla-m">BRL</h3>
                    </div>
                    <p id="nome-m">Real Brasileiro</p>
                </div>
                <div class="box-converter-set">
                    <p>Conversor de</p>
                    <span class="material-symbols-outlined">
                        keyboard_arrow_down
                    </span>
                </div>
            </div>
            <div class="box-para-reverse">
                <div onclick="convertionSelect('para')" class="box-para">
                    <div class="box-sigle-p">
                        <div>
                            <img id="img-c" src="./assets/countries/usd.png" alt="Icon-usd">
                            <h3 id="sigla-c">USD</h3>
                        </div>
                        <p id="nome-c">Dolar dos Estados Unidos</p>
                    </div>
                    <div class="box-para-set">
                        <p>Para</p>
                        <span class="material-symbols-outlined">
                            keyboard_arrow_down
                        </span>
                    </div>
                </div>
                <div onclick="inverterC()" class="box-resver material-symbols-outlined">
                    mobiledata_arrows
                </div>
            </div>


            <div class="box-result">
                <div class="box-res-1">
                    <p>Conversão de:</p>
                    <span id="simbolo-m">R$</span>
                    <span id="valor-m"> 0</span>
                </div>
                <div class="box-res-2">
                    <p>Para:</p>
                    <span id="simbolo-c">$</span>
                    <span id="valor-c"> 0</span>
                </div>
            </div>
            <div class="box-haset">
                <p><span id="vname-m"></span> igual a <span id="vname-c"></span></p>
            </div>
            <button class="btn-converter" onclick="conveter()">Converter</button>
        </div>
        <div id="conteiner-contines">
            <div id="lista-moedas">
            </div>
            <div class="list-btn">
                <button onclick="Confirmar()">Confirmar</button>
                <button onclick="voltar()">Voltar</button>
            </div>

        </div>
    </section>
    <script src="./src/script.js"></script>
</body>

</html>
