<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="./style/style.css">
    <title>Conversor de moeda</title>
</head>

<body>
    <section class="conteiner-principal">
        <div class="box-title">
            <h1>CONVERSOR UNIVERSAL</h1>
            <button id="btn-dark-mode" class="material-symbols-outlined">ev_shadow</button>
        </div>
        <div id="box-inicio">
            <div class="box-valor">
                <h2>Valor</h2>
                <input placeholder="Digite o valor a converter" type="number" id="">
            </div>
            <div onclick="escolherP()" class="box-para-converter">
                <div class="box-sigle">
                    <div>
                        <img id="img-m" src="./assets/countries/brl.png" alt="Icon-brl">
                        <h3 id="sigla-m">BRL</h3>
                    </div>
                    <p id="nome-m">Real Brasileiro</p>
                </div>
                <div class="box-converter-set">
                    <p>Conversor de</p>
                    <span class="material-symbols-outlined">
                        keyboard_arrow_down
                    </span>
                </div>
            </div>
            <div class="box-para">
                <div class="box-sigle-p">
                    <div>
                        <img src="./assets/countries/usd.png" alt="Icon-usd">
                        <h3>USD</h3>
                    </div>
                    <p>Dolar dos Estados Unidos</p>
                </div>
                <div class="box-para-set">
                    <p>Para</p>
                    <span class="material-symbols-outlined">
                        keyboard_arrow_down
                    </span>
                </div>
            </div>
            <div class="box-result">
                <div class="box-res-1">
                    <p>Conversão de:<br><span>Dólar dos Estados Unidos/USD (220)</span></p>
                    <h3 id="simbolo-m">R$<span id="valor-m">5.000</span></h3>
                </div>
                <div class="box-res-2">
                    <p>Para: <br> <span>Dólar dos Estados Unidos/USD (220)</span></p>
                    <h3>$ <span>1.000</span></h3>
                </div>
            </div>
            <div class="box-haset">
                1 Real brasileiro igual a 0,20 Dólar americano
            </div>
            <button class="btn-converter" onclick="converterbtn()">Converter</button>
        </div>
        <div id="lista-moedas">
            
        </div>
    </section>
    <script src="./src/script.js"></script>
</body>

</html>
